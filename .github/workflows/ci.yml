name: ChainSaw Leg CI

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: chainsaw-leg-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-target-branch:
    name: Validate Pull Request Target Branch
    runs-on: ubuntu-latest

    steps:
      - name: Block pull requests into main
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Target branch: ${{ github.base_ref }}"
          echo "Source branch: ${{ github.head_ref }}"

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "main" ]; then
            echo "Pull requests into main are forbidden."
            echo "Create pull requests into develop only."
            exit 1
          fi

          echo "Pull request target branch is valid."

  unity-project-validation:
    name: Validate Unity Project
    runs-on: ubuntu-latest
    needs:
      - validate-target-branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Pull Git LFS files
        run: |
          git lfs pull

      - name: List Git LFS files
        run: |
          git lfs ls-files

      - name: Check repository status
        run: |
          git status --short

      - name: Validate Unity project structure
        run: |
          test -d Assets
          test -d Packages
          test -d ProjectSettings
          test -f ProjectSettings/ProjectVersion.txt

      - name: Validate project folders
        run: |
          test -d Assets/_Project
          test -d Assets/_Project/Core
          test -d Assets/_Project/Features

      - name: Check for missing Git LFS content
        run: |
          if grep -RIl "version https://git-lfs.github.com/spec/v1" Assets ProjectSettings Packages 2>/dev/null; then
            echo "Git LFS pointer files found. Some LFS assets were not pulled correctly."
            exit 1
          fi

      - name: Unity tests placeholder
        run: |
          echo "Unity Test Runner step will be added later."
          echo "Planned checks:"
          echo "- EditMode tests"
          echo "- PlayMode tests"
          echo "- Unity build"
          echo "- .meta files validation"

      - name: CI completed
        run: |
          echo "Basic CI validation completed successfully."